<button
  type="button"
  data-shortcuts-help
  class="inline-flex h-9 w-9 items-center justify-center rounded-md border border-stone-300 hover:bg-stone-100 dark:border-zinc-700 dark:hover:bg-zinc-900"
  aria-label="Keyboard shortcuts"
  title="Keyboard shortcuts (?)"
>
  <i data-lucide="keyboard" class="h-4 w-4" aria-hidden="true"></i>
</button>

<dialog
  id="keyboard-shortcuts-dialog"
  class="w-[min(100%,24rem)] rounded-lg border border-stone-200 bg-white p-0 text-stone-950 shadow-xl backdrop:bg-stone-950/40 dark:border-zinc-800 dark:bg-zinc-900 dark:text-stone-100"
  aria-labelledby="shortcuts-title"
>
  <div class="flex items-center justify-between border-b border-stone-200 px-4 py-3 dark:border-zinc-800">
    <h2 id="shortcuts-title" class="text-base font-semibold">Keyboard shortcuts</h2>
    <button
      type="button"
      data-close-shortcuts
      class="inline-flex h-8 w-8 items-center justify-center rounded-md hover:bg-stone-100 dark:hover:bg-zinc-800"
      aria-label="Close"
    >
      <i data-lucide="x" class="h-4 w-4" aria-hidden="true"></i>
    </button>
  </div>
  <dl class="space-y-3 px-4 py-4 text-sm">
    <div class="flex items-center justify-between gap-4">
      <dt>New task</dt>
      <dd><kbd class="rounded border border-stone-300 bg-stone-100 px-1.5 py-0.5 font-mono text-xs dark:border-zinc-700 dark:bg-zinc-800">Alt</kbd> + <kbd class="rounded border border-stone-300 bg-stone-100 px-1.5 py-0.5 font-mono text-xs dark:border-zinc-700 dark:bg-zinc-800">N</kbd></dd>
    </div>
    <div class="flex items-center justify-between gap-4">
      <dt>Focus search</dt>
      <dd><kbd class="rounded border border-stone-300 bg-stone-100 px-1.5 py-0.5 font-mono text-xs dark:border-zinc-700 dark:bg-zinc-800">Alt</kbd> + <kbd class="rounded border border-stone-300 bg-stone-100 px-1.5 py-0.5 font-mono text-xs dark:border-zinc-700 dark:bg-zinc-800">/</kbd></dd>
    </div>
    <div class="flex items-center justify-between gap-4">
      <dt>Move between tasks</dt>
      <dd><kbd class="rounded border border-stone-300 bg-stone-100 px-1.5 py-0.5 font-mono text-xs dark:border-zinc-700 dark:bg-zinc-800">J</kbd> / <kbd class="rounded border border-stone-300 bg-stone-100 px-1.5 py-0.5 font-mono text-xs dark:border-zinc-700 dark:bg-zinc-800">K</kbd></dd>
    </div>
    <div class="flex items-center justify-between gap-4">
      <dt>Save inline edit</dt>
      <dd><kbd class="rounded border border-stone-300 bg-stone-100 px-1.5 py-0.5 font-mono text-xs dark:border-zinc-700 dark:bg-zinc-800">Enter</kbd></dd>
    </div>
    <div class="flex items-center justify-between gap-4">
      <dt>Cancel edit</dt>
      <dd><kbd class="rounded border border-stone-300 bg-stone-100 px-1.5 py-0.5 font-mono text-xs dark:border-zinc-700 dark:bg-zinc-800">Esc</kbd></dd>
    </div>
    <div class="flex items-center justify-between gap-4">
      <dt>Show this help</dt>
      <dd><kbd class="rounded border border-stone-300 bg-stone-100 px-1.5 py-0.5 font-mono text-xs dark:border-zinc-700 dark:bg-zinc-800">?</kbd></dd>
    </div>
  </dl>
</dialog>
