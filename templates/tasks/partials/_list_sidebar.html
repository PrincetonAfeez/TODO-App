<aside id="list-sidebar" class="h-fit rounded-md border border-stone-200 bg-white p-3 dark:border-zinc-800 dark:bg-zinc-900">
  <div class="flex items-center justify-between">
    <h2 class="text-sm font-semibold uppercase text-stone-500 dark:text-stone-400">Lists</h2>
    <a href="{% url 'tasks:lists' %}" title="All lists" class="inline-flex h-8 w-8 items-center justify-center rounded-md hover:bg-stone-100 dark:hover:bg-zinc-800">
      <i data-lucide="panel-left" class="h-4 w-4"></i>
    </a>
  </div>

  <nav class="mt-3 space-y-1">
    {% for list in task_lists %}
      <a
        href="{% url 'tasks:list_detail' list.id %}"
        class="flex items-center justify-between gap-2 rounded-md px-3 py-2 text-sm hover:bg-stone-100 dark:hover:bg-zinc-800 {% if current_list and current_list.id == list.id %}bg-emerald-50 text-emerald-800 dark:bg-emerald-950/50 dark:text-emerald-200{% endif %}"
      >
        <span class="min-w-0 truncate">{{ list.name }}</span>
        <span id="list-count-{{ list.id }}" class="rounded bg-stone-200 px-1.5 py-0.5 text-xs text-stone-700 dark:bg-zinc-800 dark:text-stone-300">{{ list.active_task_count }}</span>
      </a>
    {% empty %}
      <p class="px-3 py-2 text-sm text-stone-500 dark:text-stone-400">No lists</p>
    {% endfor %}
  </nav>

  <form class="mt-4 flex flex-col gap-2" hx-post="{% url 'tasks:lists' %}" hx-target="#list-sidebar" hx-swap="outerHTML">
    {% csrf_token %}
    {% if list_form.errors %}
      <p id="list-sidebar-form-errors" role="alert" class="rounded-md border border-red-200 bg-red-50 px-2 py-1 text-xs text-red-800 dark:border-red-900 dark:bg-red-950/40 dark:text-red-100">
        {{ list_form.name.errors|striptags }}
      </p>
    {% endif %}
    {% if current_list %}
      <input type="hidden" name="current_list_id" value="{{ current_list.id }}">
    {% endif %}
    <div class="flex gap-2">
      <input
        name="name"
        required
        placeholder="New list"
        value="{{ list_form.name.value|default_if_none:'' }}"
        class="h-9 min-w-0 flex-1 rounded-md border bg-white px-3 text-sm dark:bg-zinc-950 {% if list_form.name.errors %}border-red-500 ring-1 ring-red-500 dark:border-red-500{% else %}border-stone-300 dark:border-zinc-700{% endif %}"
        {% if list_form.name.errors %}aria-invalid="true" aria-describedby="list-sidebar-form-errors"{% endif %}
      >
      <button title="Create list" class="inline-flex h-9 w-9 items-center justify-center rounded-md bg-emerald-600 text-white hover:bg-emerald-700">
        <i data-lucide="plus" class="h-4 w-4"></i>
      </button>
    </div>
  </form>
</aside>
