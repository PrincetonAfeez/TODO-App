<div
  id="subtask-row-{{ task.id }}"
  tabindex="-1"
  class="subtask-row grid gap-2 border-b border-stone-100 px-3 py-2 last:border-0 dark:border-zinc-800 sm:grid-cols-[auto_minmax(0,1fr)_auto] sm:items-center {% if task.status == 'done' %}opacity-70{% endif %} {% if task.is_deleted %}bg-red-50 dark:bg-red-950/20{% endif %}"
  data-task-id="{{ task.id }}"
  data-task-row
  data-nav-row
>
  <label
    class="mt-1 inline-flex h-7 w-7 cursor-pointer items-center justify-center rounded-md border border-stone-300 hover:bg-stone-100 dark:border-zinc-700 dark:hover:bg-zinc-800 {% if task.is_deleted %}cursor-not-allowed opacity-50{% endif %}"
  >
    <input
      type="checkbox"
      class="h-4 w-4 rounded border-stone-300 text-emerald-600 focus:ring-emerald-500"
      aria-label="{% if task.status == 'done' %}Reopen task{% else %}Complete task{% endif %}"
      {% if task.status == "done" %}checked{% endif %}
      {% if task.is_deleted %}disabled{% endif %}
      data-optimistic-toggle
      data-nav-focus
      hx-post="{% url 'tasks:toggle_task' task.id %}"
      hx-target="closest .subtask-row"
      hx-swap="outerHTML"
      hx-trigger="change"
    >
  </label>
  <div class="min-w-0">
    <div class="flex flex-wrap items-center gap-2">
      <span data-task-title class="min-w-0 truncate text-sm {% if task.status == 'done' %}line-through{% endif %}">{{ task.title }}</span>
      <span class="rounded px-1.5 py-0.5 text-xs {% if task.priority == 'high' %}bg-red-100 text-red-700 dark:bg-red-950 dark:text-red-300{% elif task.priority == 'low' %}bg-sky-100 text-sky-700 dark:bg-sky-950 dark:text-sky-300{% else %}bg-amber-100 text-amber-800 dark:bg-amber-950 dark:text-amber-300{% endif %}">{{ task.get_priority_display }}</span>
      {% if task.is_deleted %}
        <span class="rounded bg-red-100 px-1.5 py-0.5 text-xs text-red-700 dark:bg-red-950 dark:text-red-300">Deleted</span>
      {% endif %}
    </div>
    {% if task.due_date %}
      <time class="mt-1 block text-xs text-stone-500 dark:text-stone-400">{{ task.due_date|date:"M j, Y g:i A" }}</time>
    {% endif %}
  </div>
  <div class="flex gap-1 sm:justify-end">
    {% if task.is_deleted %}
      <button
        class="inline-flex h-8 items-center gap-1 rounded-md border border-stone-300 px-2 text-xs font-medium hover:bg-white dark:border-zinc-700 dark:hover:bg-zinc-800"
        hx-post="{% url 'tasks:restore_task' task.id %}"
        hx-target="closest .subtask-row"
        hx-swap="outerHTML"
      >
        <i data-lucide="rotate-ccw" class="h-3.5 w-3.5"></i>
        Restore
      </button>
    {% else %}
      <button
        type="button"
        title="Edit"
        aria-label="Edit subtask"
        class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-stone-300 hover:bg-white dark:border-zinc-700 dark:hover:bg-zinc-800"
        hx-get="{% url 'tasks:edit_task' task.id %}"
        hx-target="closest .subtask-row"
        hx-swap="outerHTML"
      >
        <i data-lucide="pencil" class="h-3.5 w-3.5" aria-hidden="true"></i>
      </button>
      <button
        type="button"
        title="Delete"
        aria-label="Delete subtask"
        class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-red-300 text-red-700 hover:bg-red-50 dark:border-red-900 dark:text-red-300 dark:hover:bg-red-950/40"
        hx-post="{% url 'tasks:delete_task' task.id %}"
        hx-target="closest .subtask-row"
        hx-swap="outerHTML"
        hx-confirm="Move this subtask to deleted?"
      >
        <i data-lucide="trash-2" class="h-3.5 w-3.5" aria-hidden="true"></i>
      </button>
      <button type="button" title="Drag to reorder" aria-label="Drag to reorder subtask" class="drag-handle inline-flex h-8 w-8 cursor-grab items-center justify-center rounded-md text-stone-500 hover:bg-white dark:hover:bg-zinc-800">
        <i data-lucide="grip-vertical" class="h-3.5 w-3.5" aria-hidden="true"></i>
      </button>
    {% endif %}
  </div>
</div>
