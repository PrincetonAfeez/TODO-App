<form
  id="new-task-form"
  class="rounded-md border border-stone-200 bg-white p-3 dark:border-zinc-800 dark:bg-zinc-900"
  hx-post="{% url 'tasks:create_task' current_list.id %}"
  hx-target="#task-list"
  hx-swap="beforeend"
>
  {% csrf_token %}
  {% include "tasks/partials/_form_errors.html" with form=form error_id="new-task-form-errors" %}
  <div class="grid gap-2 sm:grid-cols-[minmax(0,1fr)_auto]">
    <input
      name="title"
      data-new-task-input
      required
      placeholder="New task"
      autocomplete="off"
      value="{{ form.title.value|default_if_none:'' }}"
      class="h-10 min-w-0 rounded-md border bg-white px-3 text-sm dark:bg-zinc-950 {% if form.title.errors %}border-red-500 ring-1 ring-red-500 dark:border-red-500{% else %}border-stone-300 dark:border-zinc-700{% endif %}"
      {% if form.title.errors %}aria-invalid="true" aria-describedby="new-task-form-errors"{% endif %}
    >
    <button type="submit" class="inline-flex h-10 items-center justify-center gap-2 rounded-md bg-emerald-600 px-4 text-sm font-semibold text-white hover:bg-emerald-700">
      <i data-lucide="plus" class="h-4 w-4" aria-hidden="true"></i>
      Add
    </button>
  </div>
  <details class="mt-2" data-new-task-details {% if show_task_details %}open{% endif %}>
    <summary class="cursor-pointer text-sm font-medium text-stone-600 dark:text-stone-300">Add details</summary>
    <div class="mt-2 grid gap-2 lg:grid-cols-[12rem_9rem_1fr]">
      {# due_date_value: raw POST passthrough on validation errors (datetime-local) #}
      <input
        name="due_date"
        type="datetime-local"
        value="{{ due_date_value|default:'' }}"
        class="h-10 rounded-md border border-stone-300 bg-white px-3 text-sm dark:border-zinc-700 dark:bg-zinc-950"
      >
      <select name="priority" class="h-10 rounded-md border border-stone-300 bg-white px-3 text-sm dark:border-zinc-700 dark:bg-zinc-950">
        {% for value,label in priority_choices %}
          <option value="{{ value }}" {% if form.priority.value|default:"medium" == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
      <textarea name="notes" rows="2" placeholder="Notes" class="min-h-10 rounded-md border border-stone-300 bg-white px-3 py-2 text-sm dark:border-zinc-700 dark:bg-zinc-950 lg:col-span-1">{{ form.notes.value|default_if_none:'' }}</textarea>
    </div>
  </details>
</form>
