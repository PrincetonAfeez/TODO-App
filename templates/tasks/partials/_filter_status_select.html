<span id="filter-status-field"{% if oob %} hx-swap-oob="outerHTML"{% endif %}>
  <select
    name="status"
    class="h-9 w-full rounded-md border border-stone-300 bg-white px-2 text-sm dark:border-zinc-700 dark:bg-zinc-950 disabled:cursor-not-allowed disabled:opacity-60"
    aria-label="{% if not status_filter_enabled %}Status (disabled for date views){% else %}Status{% endif %}"
    {% if not status_filter_enabled %}
      disabled
      title="Today, Upcoming, and Overdue show open tasks only."
    {% endif %}
  >
    <option value="">Any status</option>
    {% for value,label in status_choices %}
      <option value="{{ value }}" {% if status_filter_enabled and filters.status == value %}selected{% endif %}>{{ label }}</option>
    {% endfor %}
  </select>
</span>
