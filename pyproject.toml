[tool.black]
line-length = 88
target-version = ["py312"]

[tool.ruff]
line-length = 88
target-version = "py312"
src = ["config", "tasks"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "DJ"]
ignore = ["DJ001"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.dev"
python_files = ["test_*.py", "*_test.py", "tests.py", "tests_e2e.py", "tests_a11y_e2e.py"]
addopts = "-q"
markers = [
    "e2e: browser integration tests (Playwright)",
]

[tool.coverage.run]
source = ["tasks"]
omit = [
    "tasks/migrations/*",
    "tasks/tests*.py",
    "tasks/test_*.py",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
fail_under = 90

[tool.mypy]
python_version = "3.12"
plugins = ["mypy_django_plugin.main"]
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = ["tasks.models", "tasks.services", "tasks.views"]
ignore_missing_imports = false

[[tool.mypy.overrides]]
module = ["config.*", "environ"]
ignore_missing_imports = true

[tool.django-stubs]
django_settings_module = "config.settings.dev"

